services:
  - type: web
    name: summa-ai-backend
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    plan: starter
    region: oregon
    branch: main
    rootDir: apps/api
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: COGNEE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_CLUSTER_ENDPOINT
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        value: '["https://your-frontend-domain.com"]'
      - key: SCHEDULER_ENABLED
        value: true
      - key: DEMO_USER_EMAIL
        value: alex@summa.ai

  - type: web
    name: summa-ai-frontend
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    plan: starter
    region: oregon
    branch: main
    rootDir: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_FASTAPI_BASE_URL
        value: https://summa-ai-backend.onrender.com/api/v1
      - key: NEXT_PUBLIC_SUMMASTUDY_API_BASE
        value: https://summa-ai-backend.onrender.com
